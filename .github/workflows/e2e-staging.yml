name: E2E Staging

on:
  workflow_dispatch:
    inputs:
      run_mutating_public_proposal:
        description: 'Run the staging-only mutating public proposal acceptance spec'
        required: true
        default: false
        type: boolean

env:
  NODE_VERSION: '20.x'
  NEXT_TELEMETRY_DISABLED: 1
  PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
  STAGING_PROJECT_REF: dnzytocmtmnptndeczny

jobs:
  e2e-staging:
    runs-on: ubuntu-latest
    name: Playwright E2E against staging
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Validate required E2E secrets
        shell: bash
        env:
          STAGING_NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_NEXT_PUBLIC_SUPABASE_URL }}
          STAGING_NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          STAGING_APP_ENCRYPTION_KEY: ${{ secrets.STAGING_APP_ENCRYPTION_KEY }}
          STAGING_APP_ENCRYPTION_PEPPER: ${{ secrets.STAGING_APP_ENCRYPTION_PEPPER }}
          E2E_AGENT_EMAIL: ${{ secrets.E2E_AGENT_EMAIL }}
          E2E_AGENT_PASSWORD: ${{ secrets.E2E_AGENT_PASSWORD }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_PUBLIC_PROPOSAL_TOKEN: ${{ secrets.E2E_PUBLIC_PROPOSAL_TOKEN }}
          E2E_MUTATING_PUBLIC_PROPOSAL_TOKEN: ${{ secrets.E2E_MUTATING_PUBLIC_PROPOSAL_TOKEN }}
        run: |
          missing=0
          for name in \
            STAGING_NEXT_PUBLIC_SUPABASE_URL \
            STAGING_NEXT_PUBLIC_SUPABASE_ANON_KEY \
            STAGING_APP_ENCRYPTION_KEY \
            STAGING_APP_ENCRYPTION_PEPPER \
            E2E_AGENT_EMAIL \
            E2E_AGENT_PASSWORD \
            E2E_ADMIN_EMAIL \
            E2E_ADMIN_PASSWORD \
            E2E_PUBLIC_PROPOSAL_TOKEN
          do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing E2E secret::$name is required for staging E2E"
              missing=1
            fi
          done

          if [ "${{ inputs.run_mutating_public_proposal }}" = "true" ] && [ -z "$E2E_MUTATING_PUBLIC_PROPOSAL_TOKEN" ]; then
            echo "::error title=Missing mutating E2E secret::E2E_MUTATING_PUBLIC_PROPOSAL_TOKEN is required when run_mutating_public_proposal=true"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          if [[ "$STAGING_NEXT_PUBLIC_SUPABASE_URL" != *"$STAGING_PROJECT_REF"* ]]; then
            echo "::error title=Wrong Supabase project::STAGING_NEXT_PUBLIC_SUPABASE_URL must point to staging project $STAGING_PROJECT_REF"
            exit 1
          fi

      - name: Write staging env file
        shell: bash
        env:
          STAGING_NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_NEXT_PUBLIC_SUPABASE_URL }}
          STAGING_NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          STAGING_APP_ENCRYPTION_KEY: ${{ secrets.STAGING_APP_ENCRYPTION_KEY }}
          STAGING_APP_ENCRYPTION_PEPPER: ${{ secrets.STAGING_APP_ENCRYPTION_PEPPER }}
          E2E_AGENT_EMAIL: ${{ secrets.E2E_AGENT_EMAIL }}
          E2E_AGENT_PASSWORD: ${{ secrets.E2E_AGENT_PASSWORD }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_PUBLIC_PROPOSAL_TOKEN: ${{ secrets.E2E_PUBLIC_PROPOSAL_TOKEN }}
          E2E_MUTATING_PUBLIC_PROPOSAL_TOKEN: ${{ secrets.E2E_MUTATING_PUBLIC_PROPOSAL_TOKEN }}
        run: |
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=$STAGING_NEXT_PUBLIC_SUPABASE_URL"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$STAGING_NEXT_PUBLIC_SUPABASE_ANON_KEY"
            echo "APP_ENCRYPTION_KEY=$STAGING_APP_ENCRYPTION_KEY"
            echo "APP_ENCRYPTION_PEPPER=$STAGING_APP_ENCRYPTION_PEPPER"
            echo "E2E_AGENT_EMAIL=$E2E_AGENT_EMAIL"
            echo "E2E_AGENT_PASSWORD=$E2E_AGENT_PASSWORD"
            echo "E2E_ADMIN_EMAIL=$E2E_ADMIN_EMAIL"
            echo "E2E_ADMIN_PASSWORD=$E2E_ADMIN_PASSWORD"
            echo "E2E_PUBLIC_PROPOSAL_TOKEN=$E2E_PUBLIC_PROPOSAL_TOKEN"
            echo "E2E_MUTATING_PUBLIC_PROPOSAL_TOKEN=$E2E_MUTATING_PUBLIC_PROPOSAL_TOKEN"
            echo "PLAYWRIGHT_BASE_URL=$PLAYWRIGHT_BASE_URL"
          } > .env.staging.local

      - name: Start staging app
        run: |
          npm run dev:staging > /tmp/zinergia-e2e-server.log 2>&1 &
          echo $! > /tmp/zinergia-e2e-server.pid
          node -e "const url = process.env.PLAYWRIGHT_BASE_URL; const deadline = Date.now() + 120000; const wait = () => fetch(url).then((res) => { if (!res.ok) throw new Error(String(res.status)); }).catch((err) => { if (Date.now() > deadline) throw err; return new Promise((resolve) => setTimeout(resolve, 1000)).then(wait); }); wait();"

      - name: Run read-safe E2E suite
        if: ${{ inputs.run_mutating_public_proposal != true }}
        run: npm run test:e2e

      - name: Run mutating public proposal E2E
        if: ${{ inputs.run_mutating_public_proposal }}
        run: npm run test:e2e:public-mutating
        env:
          E2E_RUN_MUTATING_PUBLIC_PROPOSAL: '1'

      - name: Upload Playwright report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload E2E server log
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: e2e-server-log
          path: /tmp/zinergia-e2e-server.log
          if-no-files-found: ignore
          retention-days: 7
